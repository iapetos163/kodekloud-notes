#Very similar to RS definition
#A deployment creates an RS with matching properties
# A deployment lets you "version" an RS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue
spec:
  template:
    metadata:
      labels:
        app: blue
    spec:
      containers:
        - name: nginx
          image: nginx
  replicas: 3
  # Any pods matching this selector
  # are considered to be within this RS
  selector:
    matchLabels:
      app: blue
